name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy

      - name: Create Buildozer Spec File
        run: buildozer init

      - name: Custom Spec Adjustments
        run: |
          sed -i 's/# requirements = kivy/requirements = kivy,python3/' buildozer.spec
          sed -i 's/# android.permissions = INTERNET/android.permissions = INTERNET/' buildozer.spec

      - name: Build with Buildozer
        run: buildozer android debug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Food-Network-App
          path: bin/*.apk
